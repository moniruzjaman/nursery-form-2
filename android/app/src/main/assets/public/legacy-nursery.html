    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 50%, #4caf50 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid white;
            background: white;
            object-fit: contain;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header h2 {
            font-size: 1.2rem;
            font-weight: normal;
            opacity: 0.95;
        }

        .header .year {
            background: rgba(255,255,255,0.2);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            margin-top: 10px;
            font-weight: bold;
        }

        .form-container {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            background: #fafafa;
        }

        .section-title {
            background: #2e7d32;
            color: white;
            padding: 10px 20px;
            margin: -20px -20px 20px -20px;
            border-radius: 8px 8px 0 0;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
            font-size: 0.95rem;
        }

        .required::after {
            content: " *";
            color: #d32f2f;
        }

        input[type="text"],
        input[type="tel"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #4caf50;
            outline: none;
            box-shadow: 0 0 0 3px rgba(76,175,80,0.1);
        }

        select {
            cursor: pointer;
            background: white;
        }

        .seedling-section {
            background: white;
            border: 1px solid #c8e6c9;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .seedling-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e0e0e0;
        }

        .seedling-title {
            font-weight: bold;
            color: #2e7d32;
        }

        .btn-remove {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-add {
            background: #4caf50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .btn-add:hover {
            background: #45a049;
        }

        .btn-submit {
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .status.success {
            background: #c8e6c9;
            color: #1b5e20;
            border: 1px solid #4caf50;
        }

        .status.error {
            background: #ffcdd2;
            color: #d32f2f;
            border: 1px solid #f44336;
        }

        .status.pending {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffc107;
        }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .two-col {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.4rem;
            }

            .logo {
                width: 60px;
                height: 60px;
            }
        }

        .offline-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ff9800;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .sync-btn {
            background: #2196f3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .sync-btn:hover {
            background: #1976d2;
        }

        .pending-count {
            background: #ff5722;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="container">

        function updateOnlineStatus() {
            const badge = document.getElementById('offlineBadge');
            const syncBtn = document.getElementById('syncBtn');

            if (!navigator.onLine) {
                badge.style.display = 'block';
                showStatus('আপনি অফলাইনে আছেন। ডাটা লোকাল স্টোরেজে সংরক্ষিত হবে।', 'pending');
            } else {
                badge.style.display = 'none';
                checkPendingData();
            }
        }

        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);

        // Get geolocation
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        document.getElementById('geoLocation').value = `${lat}, ${lng}`;
                        showStatus('লোকেশন সফলভাবে সংগ্রহ হয়েছে!', 'success');
                    },
                    (error) => {
                        showStatus('লোকেশন সংগ্রহে সমস্যা: ' + error.message, 'error');
                    }
                );
            } else {
                showStatus('আপনার ব্রাউজার জিওলোকেশন সাপোর্ট করে না', 'error');
            }
        }

        // Add seedling entry
        function addSeedling(type) {
            seedlingCounters[type]++;
            const container = document.getElementById(type + 'Seedlings');
            const counter = seedlingCounters[type];

            const div = document.createElement('div');
            div.className = 'seedling-section';
            div.id = `${type}_${counter}`;
            div.innerHTML = `
                <div class="seedling-header">
                    <span class="seedling-title">চারা #${counter}</span>
                    <button type="button" class="btn-remove" onclick="removeSeedling('${type}', ${counter})">❌ সরান</button>
                </div>
                <div class="two-col">
                    <div class="form-group">
                        <label>চারার নাম</label>
                        <input type="text" name="${type}_name_${counter}" placeholder="চারার নাম">
                    </div>
                    <div class="form-group">
                        <label>চারার বয়স</label>
                        <select name="${type}_age_${counter}">
                            <option value="">নির্বাচন করুন</option>
                            <option value="১ মাস-৬মাস">১ মাস-৬মাস</option>
                            <option value="৬ মাস- ১ বছর">৬ মাস- ১ বছর</option>
                            <option value="১ বছর- ২ বছর">১ বছর- ২ বছর</option>
                            <option value="২ বছরের বেশি">২ বছরের বেশি</option>
                        </select>
                    </div>
                </div>
                <div class="two-col">
                    <div class="form-group">
                        <label>চারা (সংখ্যা)</label>
                        <input type="number" name="${type}_count_${counter}" placeholder="০" min="0">
                    </div>
                    <div class="form-group">
                        <label>কলম (সংখ্যা)</label>
                        <input type="number" name="${type}_graft_${counter}" placeholder="০" min="0">
                    </div>
                </div>
            `;
            container.appendChild(div);
        }

        // Remove seedling entry
        function removeSeedling(type, counter) {
            const element = document.getElementById(`${type}_${counter}`);
            if (element) {
                element.remove();
            }
        }

        // Show status message
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
            status.style.display = 'block';

            if (type === 'success') {
                setTimeout(() => {
                    status.style.display = 'none';
                }, 5000);
            }
        }

        // Collect form data
        function collectFormData() {
            const formData = {
                timestamp: new Date().toISOString(),
                division: document.getElementById('division').value,
                district: document.getElementById('district').value,
                upazila: document.getElementById('upazila').value,
                nurseryName: document.getElementById('nurseryName').value,
                mobile: document.getElementById('mobile').value,
                geoLocation: document.getElementById('geoLocation').value,
                address: document.getElementById('address').value,
                fruitSeedlings: [],
                forestSeedlings: [],
                medicinalSeedlings: [],
                wildSeedlings: []
            };

            // Collect seedlings data
            ['fruit', 'forest', 'medicinal', 'wild'].forEach(type => {
                const container = document.getElementById(type + 'Seedlings');
                const sections = container.getElementsByClassName('seedling-section');

                for (let section of sections) {
                    const id = section.id;
                    const counter = id.split('_')[1];

                    const seedling = {
                        name: document.querySelector(`[name="${type}_name_${counter}"]`)?.value || '',
                        age: document.querySelector(`[name="${type}_age_${counter}"]`)?.value || '',
                        count: document.querySelector(`[name="${type}_count_${counter}"]`)?.value || '',
                        graft: document.querySelector(`[name="${type}_graft_${counter}"]`)?.value || ''
                    };

                    if (seedling.name || seedling.count) {
                        formData[type + 'Seedlings'].push(seedling);
                    }
                }
            });

            return formData;
        }

        // Save to local storage
        function saveToLocalStorage(data) {
            let pendingData = JSON.parse(localStorage.getItem('pendingNurseryData') || '[]');
            pendingData.push(data);
            localStorage.setItem('pendingNurseryData', JSON.stringify(pendingData));
            updatePendingCount();
        }

        // Update pending count
        function updatePendingCount() {
            const pendingData = JSON.parse(localStorage.getItem('pendingNurseryData') || '[]');
            const count = pendingData.length;
            const syncBtn = document.getElementById('syncBtn');
            const pendingCount = document.getElementById('pendingCount');

            pendingCount.textContent = count;
            syncBtn.style.display = count > 0 ? 'inline-block' : 'none';
        }

        // Check pending data on load
        function checkPendingData() {
            updatePendingCount();
            if (navigator.onLine) {
                syncPendingData();
            }
        }

        // Sync pending data
        async function syncPendingData() {
            if (!navigator.onLine) {
                showStatus('আপনি অফলাইনে আছেন। ইন্টারনেট সংযোগ চেক করুন।', 'error');
                return;
            }

            const pendingData = JSON.parse(localStorage.getItem('pendingNurseryData') || '[]');
            if (pendingData.length === 0) return;

            showStatus(`অফলাইন থেকে ${pendingData.length}টি তথ্য সিঙ্ক করা হচ্ছে...`, 'pending');

            let successCount = 0;
            let failedData = [];

            for (let data of pendingData) {
                try {
                    const success = await submitToGoogleSheet(data);
                    if (success) {
                        successCount++;
                    } else {
                        failedData.push(data);
                    }
                } catch (error) {
                    failedData.push(data);
                }
            }

            localStorage.setItem('pendingNurseryData', JSON.stringify(failedData));
            updatePendingCount();

            if (successCount > 0) {
                showStatus(`${successCount}টি তথ্য সফলভাবে সিঙ্ক হয়েছে!`, 'success');
            }
            if (failedData.length > 0) {
                showStatus(`${failedData.length}টি তথ্য সিঙ্ক করতে ব্যর্থ হয়েছে।`, 'error');
            }
        }

        // Submit to Google Sheet
        async function submitToGoogleSheet(data) {
            try {
                // Using no-cors mode for Google Apps Script
                const response = await fetch(GOOGLE_SHEET_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                // With no-cors, we can't read response, assume success if no error
                return true;
            } catch (error) {
                console.error('Submission error:', error);
                return false;
            }
        }

        // Form submission
        document.getElementById('nurseryForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'প্রক্রিয়াধীন...';

            const formData = collectFormData();

            // Validation
            if (!formData.upazila || !formData.nurseryName || !formData.mobile) {
                showStatus('অনুগ্রহ করে সকল প্রয়োজনীয় তথ্য পূরণ করুন।', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'তথ্য জমা দিন 📤';
                return;
            }

            if (navigator.onLine) {
                // Try to submit online
                const success = await submitToGoogleSheet(formData);

                if (success) {
                    showStatus('তথ্য সফলভাবে জমা হয়েছে! ✅', 'success');
                    document.getElementById('nurseryForm').reset();
                    // Clear seedlings
                    ['fruit', 'forest', 'medicinal', 'wild'].forEach(type => {
                        document.getElementById(type + 'Seedlings').innerHTML = '';
                        seedlingCounters[type] = 0;
                    });
                    // Add one default seedling for each type
                    addSeedling('fruit');
                    addSeedling('forest');
                    addSeedling('medicinal');
                    addSeedling('wild');
                } else {
                    // Save to local storage if online submission fails
                    saveToLocalStorage(formData);
                    showStatus('সার্ভারে জমা দিতে ব্যর্থ। ডাটা লোকাল স্টোরেজে সংরক্ষিত হয়েছে।', 'pending');
                }
            } else {
                // Save to local storage if offline
                saveToLocalStorage(formData);
                showStatus('আপনি অফলাইনে আছেন। ডাটা সফলভাবে সংরক্ষিত হয়েছে। ইন্টারনেট চলে আসলে অটো সিঙ্ক হবে।', 'pending');
                document.getElementById('nurseryForm').reset();
            }

            submitBtn.disabled = false;
            submitBtn.textContent = 'তথ্য জমা দিন 📤';
        });

        // Initialize on load
        window.onload = function() {
            updateOnlineStatus();
            // Add one default seedling for each type
            addSeedling('fruit');
            addSeedling('forest');
            addSeedling('medicinal');
            addSeedling('wild');
        };
    </script>
</body>
</html>
